
<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    {% load blog_tags %}
    <title>{% block title %}{% endblock %}</title>
    <!-- link to blog CSS -->
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>
<body>
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
    <div id="sidebar">
        <h2>My Blog</h2>
        <p>This is my blog</p>
        <p>I've written {% total_posts %} posts so far.</p>
        <h3>Latest posts</h3>
        {% comment %} {% show_latest_posts 3 %} {% endcomment %}
    </div>
</body>
</html>
